<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="send-date" content="[SEND_DATE]">
    <meta name="send-time" content="[SEND_TIME]">
    <title>E-Day Starting In 2 Hours - [PANELIST_FULL_NAME]</title>
    <style>
        :root {
            color-scheme: light;
        }
        body {
            margin: 0;
            padding: 48px 20px;
            background-color: #f4f6fb;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: #1f2937;
        }
        .email-wrapper {
            max-width: 720px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }
        .email-body {
            padding: 44px 48px 40px;
            font-size: 16px;
            line-height: 1.75;
        }
        .email-body p {
            margin: 0 0 18px;
        }
        .email-body p:last-child {
            margin-bottom: 0;
        }
        .email-body ul,
        .email-body ol {
            margin: 0 0 22px 20px;
            padding-left: 22px;
        }
        .email-body li {
            margin: 6px 0;
        }
        .signature p {
            margin-bottom: 6px;
        }
        .signature p:last-child {
            margin-bottom: 0;
        }
        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
            color: #1d4ed8;
        }
        strong {
            font-weight: 600;
        }
        @media (max-width: 600px) {
            body {
                padding: 32px 12px;
            }
            .email-body {
                padding: 32px 24px 28px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-body">
<p>Hi [PANELIST_FIRST_NAME],</p>
            <p>We are live in two hours.</p>
            <ul>
                <li>Join the Zoom room at <strong>7:50 PM EST</strong> for the tech check.</li>
                <li>We go live at <strong>8:00 PM EST</strong>.</li>
            </ul>
            <p><strong>Panelist link:</strong> <a href="[PANELIST_ZOOM_JOIN_LINK]">Launch Zoom</a></p>
            <p>See you shortly!</p>
            <div class="signature">
                <p>Best regards,</p>
                <p>Chaluka Harsha</p>
                <p>Event Coordinator</p>
                <p>Veterinary Business Institute</p>
            </div>
        </div>
    </div>
</body>
</html>
